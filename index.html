<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riklary - E-Book Reader</title>
    <!-- Tailwind CSS untuk UI cepat & rapi -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- jszip dibutuhkan oleh epub.js di latar belakang -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <!-- Library ePub.js via CDN resmi -->
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- NAV BAR -->
    <nav class="bg-gray-800 p-4 border-b border-gray-700 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400">📚 RIKLARY</h1>
            <button id="back-to-library"
                class="hidden bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm transition">
                Kembali ke Rak
            </button>
        </div>
    </nav>

    <!-- Halaman 1: RAK BUKU (Tampilan Awal) -->
    <main id="library-view" class="container mx-auto p-6">
        <h2 class="text-2xl font-semibold mb-6">Koleksi Buku Kamu</h2>
        <div id="books-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-400 animate-pulse">Sedang memuat rak buku...</p>
        </div>
    </main>

    <!-- Halaman 2: RUANG BACA -->
    <main id="reader-view" class="hidden container mx-auto p-6 max-w-6xl">
        <!-- Area Navigasi & Kontrol Atas -->
        <div class="flex flex-wrap gap-4 justify-between items-center mb-4 bg-gray-800 p-3 rounded-lg border border-gray-700">
            <div class="flex gap-2">
                <button id="toggle-toc"
                    class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded font-medium text-sm transition">☰ Daftar Isi</button>
                <button id="prev-page"
                    class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded font-medium shadow transition">◀ Prev</button>
            </div>
            
            <span id="book-title-display" class="font-semibold text-gray-300 truncate max-w-xs md:max-w-md">Judul Buku</span>
            
            <div class="flex gap-2">
                <!-- Dropdown Ukuran Font -->
                <select id="font-size-select" class="bg-gray-700 text-gray-200 border border-gray-600 text-sm rounded px-2 py-1 outline-none">
                    <option value="80%">Kecil</option>
                    <option value="100%" selected>Normal</option>
                    <option value="120%">Besar</option>
                    <option value="140%">Ekstra Besar</option>
                </select>
                <!-- Dropdown Warna Tema -->
                <select id="theme-select" class="bg-gray-700 text-gray-200 border border-gray-600 text-sm rounded px-2 py-1 outline-none">
                    <option value="light">☀️ Light</option>
                    <option value="dark">🌙 Dark</option>
                    <option value="sepia">🍂 Sepia</option>
                </select>
                <button id="next-page"
                    class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded font-medium shadow transition">Next ▶</button>
            </div>
        </div>

        <!-- Layout Utama: Sidebar + Area Baca -->
        <div class="flex gap-6 h-[600px]">
            <!-- Sidebar Daftar Isi -->
            <div id="toc-sidebar" class="w-64 bg-gray-800 border border-gray-700 rounded-xl p-4 overflow-y-auto hidden">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Daftar Bab</h3>
                <ul id="toc-list" class="space-y-1 text-sm"></ul>
            </div>

            <!-- Wadah tempat teks e-book (P-8 SUDAH DIHAPUS BIAR GAK KEPOTONG) -->
            <div id="viewer" class="flex-1 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden h-full"></div>
        </div>
    </main>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        const API_URL = "http://localhost:8080/api/books";
        const STATIC_BASE = "http://localhost:8080/static/";

        const libraryView = document.getElementById('library-view');
        const readerView = document.getElementById('reader-view');
        const booksGrid = document.getElementById('books-grid');
        const backBtn = document.getElementById('back-to-library');
        const viewer = document.getElementById('viewer');
        const tocSidebar = document.getElementById('toc-sidebar');
        const tocList = document.getElementById('toc-list');
        const toggleTocBtn = document.getElementById('toggle-toc');
        
        // Selector Tambahan Kontrol Tema
        const themeSelect = document.getElementById('theme-select');
        const fontSizeSelect = document.getElementById('font-size-select');

        let rendition = null;
        let book = null;

        // Definisi Object Tema Gaya untuk ePub.js
        const THEME_STYLES = {
            light: { body: { background: '#ffffff', color: '#111827' } },
            dark: { body: { background: '#111827', color: '#f3f4f6' } },
            sepia: { body: { background: '#f4ecd8', color: '#5b4636' } }
        };

        async function loadLibrary() {
            try {
                const response = await fetch(API_URL);
                const books = await response.json();
                booksGrid.innerHTML = '';

                books.forEach(b => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-lg hover:border-emerald-500 transition cursor-pointer flex flex-col justify-between";
                    const tags = b.subjects.map(t => `<span class="bg-gray-700 text-xs px-2 py-1 rounded text-gray-300">${t}</span>`).join(' ');

                    card.innerHTML = `
                        <div>
                            <h3 class="text-lg font-bold text-white mb-1 line-clamp-2">${b.title}</h3>
                            <p class="text-sm text-gray-400 mb-4">✍️ ${b.author}</p>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-auto">${tags}</div>
                    `;

                    card.addEventListener('click', () => openBook(b.title, b.extracted_path, b.file_name));
                    booksGrid.appendChild(card);
                });
            } catch (err) {
                booksGrid.innerHTML = `<p class="text-red-400">Gagal terhubung ke backend Rust. Pastikan server sudah jalan!</p>`;
            }
        }

        async function openBook(title, extractedPath, fileName) {
            libraryView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            document.getElementById('book-title-display').innerText = title;

            tocSidebar.classList.add('hidden');
            tocList.innerHTML = '';
            viewer.innerHTML = "<p class='text-gray-500 text-center pt-20 animate-pulse'>Memuat bab buku secara instan...</p>";

            const bookUrl = STATIC_BASE + extractedPath;
            if (book) { try { book.destroy(); } catch(e) {} }

            try {
                book = ePub(bookUrl);
                rendition = book.renderTo("viewer", { width: "100%", height: "100%" });

                // Registrasi Semua Varian Tema ke Engine ePub.js
                Object.keys(THEME_STYLES).forEach(name => {
                    rendition.themes.register(name, THEME_STYLES[name]);
                });

                // Muat konfigurasi awal dari interface dropdown saat ini
                applyCurrentThemeAndFont();

                const savedProgress = localStorage.getItem(`progress-${fileName}`);
                if (savedProgress) {
                    await rendition.display(savedProgress);
                } else {
                    await rendition.display();
                }

                console.log("ePub.js: Sukses me-render bab!");
                const loadingText = viewer.querySelector('p');
                if (loadingText) loadingText.remove();

                // Ekstraksi Navigasi Daftar Isi
                book.loaded.navigation.then((nav) => {
                    tocList.innerHTML = '';
                    nav.toc.forEach(chapter => {
                        const li = document.createElement('li');
                        li.className = "text-gray-300 hover:text-emerald-400 hover:bg-gray-700/50 p-2 rounded cursor-pointer transition truncate";
                        li.innerText = chapter.label.trim();
                        li.addEventListener('click', () => rendition.display(chapter.href));
                        tocList.appendChild(li);
                    });
                });

                rendition.on("relocated", (location) => {
                    const cfi = location.start.cfi;
                    localStorage.setItem(`progress-${fileName}`, cfi);
                });

            } catch (err) {
                console.error("Gagal memuat dari folder ekstraksi:", err);
                viewer.innerHTML = `<div class='text-center pt-20'><p class='text-red-500 font-bold'>Gagal Membuka Buku</p></div>`;
            }
        }

        // Fungsi pembantu menyinkronkan tema dropdown ke iframe ePub.js
        function applyCurrentThemeAndFont() {
            if (!rendition) return;
            
            const activeTheme = themeSelect.value;
            rendition.themes.select(activeTheme);
            rendition.themes.fontSize(fontSizeSelect.value);

            // Menyesuaikan pembungkus luar kontainer #viewer agar serasi dengan isi kertas e-book
            if (activeTheme === 'dark') {
                viewer.className = "flex-1 bg-gray-900 rounded-xl shadow-2xl border border-gray-700 overflow-hidden h-full";
            } else if (activeTheme === 'sepia') {
                viewer.className = "flex-1 bg-[#f4ecd8] rounded-xl shadow-2xl border border-[#e4dcc8] overflow-hidden h-full";
            } else {
                viewer.className = "flex-1 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden h-full";
            }
        }

        // Event Listeners Tema & Font
        themeSelect.addEventListener('change', applyCurrentThemeAndFont);
        fontSizeSelect.addEventListener('change', applyCurrentThemeAndFont);

        // Kontrol Navigasi Halaman
        document.getElementById('prev-page').addEventListener('click', () => rendition && rendition.prev());
        document.getElementById('next-page').addEventListener('click', () => rendition && rendition.next());

        window.addEventListener("keyup", (e) => {
            if (rendition) {
                if (e.key === "ArrowLeft") rendition.prev();
                if (e.key === "ArrowRight") rendition.next();
            }
        });

        // Handler tombol kembali
        const handleBack = () => {
            libraryView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            tocSidebar.classList.add('hidden');
            if (book) book.destroy();
        };
        backBtn.addEventListener('click', handleBack);

        toggleTocBtn.addEventListener('click', () => tocSidebar.classList.toggle('hidden'));

        loadLibrary();
    </script>
</body>

</html>
